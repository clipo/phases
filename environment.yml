# Conda environment for the "Are the phases real?" analysis pipeline.
#
# Create and activate:
#   conda env create -f environment.yml      # or: mamba env create -f environment.yml
#   conda activate phases
#   pip install -e .                          # installs the mls_emergence package
#
# Conda-forge ships the compiled GEOS / PROJ / GDAL libraries the geospatial
# stack needs, so no system geos/proj packages are required (unlike the pip
# path in README.md). Core/geospatial version floors match requirements.txt;
# the Bayesian stack is pinned exactly in the pip: section below so the MCMC
# tables reproduce. For an exactly pinned, per-platform install, use the
# lockfile instead:
#   conda-lock install --name phases conda-lock.yml
name: phases
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - numpy>=1.26
  - scipy>=1.12
  - pandas>=2.0
  - matplotlib-base>=3.8
  - networkx>=3.2
  - geopandas>=0.13
  - pyproj>=3.4
  - shapely>=2.0
  - cartopy>=0.22
  - openpyxl>=3.1
  - xlrd>=2.0
  - pandoc>=3.0          # builds the manuscript in docs/manuscript
  - pip
  - pip:
    # Bayesian stack (analyses 38-44), pinned to the tested versions. Installed
    # via pip in every path so the conda and pip environments agree on
    # pytensor 3.1.3, the version that reproduces the deposited MCMC result
    # tables bit-for-bit. conda-forge pairs pymc 6.1.0 with a newer pytensor
    # (3.2.x), which would shift the trailing digits, so these come from pip.
    - pymc==6.1.0
    - pytensor==3.1.3
    - arviz==1.2.0
    - h5netcdf==1.8.1
