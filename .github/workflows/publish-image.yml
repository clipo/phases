name: Publish container image

# Builds the reproduction environment from the Dockerfile and publishes it to
# the GitHub Container Registry (ghcr.io/clipo/phases) so reviewers can run the
# whole pipeline with `docker run`, without building anything locally.
#
# Trigger it by hand from the Actions tab (Run workflow), or automatically by
# pushing a version tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=1.0.0
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push the image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
